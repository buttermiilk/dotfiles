[bar/omori]
width = 100%
height = 30
background = #f0f0f0
foreground = #000000
font-0 = "JetBrainsMono Nerd Font:size=10;2"
modules-left = workspaces
modules-right = network volume tray datetime clock powermenu
tray-position = right
tray-padding = 5
tray-background = #f0f0f0
padding-left = 5
padding-right = 5
line-size = 3
border-color = #e6e6e6

include-file = ~/.config/polybar/modules/module.ini

[bar/omori-dark]
width = 100%
height = 30
background = #1e1e1e
foreground = #d4d4d4
font-0 = "JetBrainsMono Nerd Font:size=10;2"
modules-left = workspaces
modules-right = network volume tray datetime clock powermenu
tray-position = right
tray-padding = 5
tray-background = #1e1e1e
padding-left = 5
padding-right = 5
line-size = 3
border-color = #2e2e2e

include-file = ~/.config/polybar/modules/module.ini
