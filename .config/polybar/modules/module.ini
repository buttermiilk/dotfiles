[module/workspaces]
type = internal/i3
format = <label-state>
label-focused =  %index%
label-focused-foreground = #000000
label-focused-padding = 10px
label-unfocused =  %index%
label-unfocused-foreground = #888888
label-unfocused-padding = 10px
label-urgent =  %index%
label-urgent-foreground = #ff5555
label-urgent-padding = 10px
label-visible =  %index%
label-visible-foreground = #000000
label-visible-padding = 10px

[module/clock]
type = internal/date
interval = 60
date = %H:%M
format-prefix =  
format = <label>
label = %date%
label-foreground = #000000
label-padding = 10px

[module/network]
type = internal/network
# change this interface into yours
# do 'ip a' to check
interface = wlan0
interval = 3.0
format-connected =  
format-connected-foreground = #000000
format-connected-padding = 10px
format-disconnected =  
format-disconnected-foreground = #888888
format-disconnected-padding = 10px

[module/volume]
# or pipewire, whatever you have installed
type = internal/pulseaudio
use-ui-max = true
format-volume =   <label-volume>%
label-volume = %percentage%
label-volume-padding = 10px
format-muted =   muted
label-muted-foreground = #888888
label-muted-padding = 10px

[module/tray]
type = internal/tray
; tray options are set in config.ini
tray-padding = 10px

[module/datetime]
type = internal/date
interval = 10
date = %A %b %d
label = %date%
label-foreground = #444444
label-padding = 10px

[module/powermenu]
type = custom/menu
expand-right = false
format-spacing = 1
label-open = 󰧻 
label-open-foreground = #ff5757
label-open-padding = 10px

# TODO: fix later
menu-0-0 = Reboot
menu-0-0-exec = systemctl reboot
menu-0-1 = Shutdown
menu-0-1-exec = systemctl poweroff
menu-0-2 = Logout
menu-0-2-exec = i3-msg exit
