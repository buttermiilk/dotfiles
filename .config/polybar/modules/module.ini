[module/workspaces]
type = internal/i3
format = <label-state>
label-focused = %index%
label-focused-foreground = #000000
label-unfocused = %index%
label-unfocused-foreground = #888888
label-urgent = %index%!
label-urgent-foreground = #ff5555
label-visible = %index%
label-visible-foreground = #000000

[module/clock]
type = internal/date
interval = 60
date = %H:%M
format-prefix =  
format = <label>
label = %date%
label-foreground = #000000

[module/network]
type = internal/network
interface = wlp3s0
interval = 3.0
format-connected =  
format-connected-foreground = #000000
format-disconnected =  
format-disconnected-foreground = #888888

[module/volume]
type = internal/pulseaudio
use-ui-max = true
format-volume =   <label-volume>%
label-volume = %percentage%
format-muted =   muted
label-muted-foreground = #888888

[module/tray]
type = internal/tray
; tray options are set in config.ini

[module/datetime]
type = internal/date
interval = 10
date = %A %b %d    %H:%M
label = %date%
label-foreground = #444444

[module/powermenu]
type = custom/menu
expand-right = false
format-spacing = 1
label-open =  
label-open-foreground = #000000

menu-0-0 = Reboot
menu-0-0-exec = systemctl reboot
menu-0-1 = Shutdown
menu-0-1-exec = systemctl poweroff
menu-0-2 = Logout
menu-0-2-exec = i3-msg exit
