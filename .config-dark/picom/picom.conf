# Backend
backend = "glx";
vsync = true;

# Shadows
shadow = true;
shadow-radius = 5;
shadow-offset-x = 10;
shadow-offset-y = 10;
shadow-opacity = 1.0;
shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Dunst'",
  "class_g ?= 'rofi'"
];

# Fading
fading = true;
fade-delta = 4;
fade-in-step = 0.05;
fade-out-step = 0.05;

# Transparency
inactive-opacity = 0.8;
active-opacity = 1.0;
frame-opacity = 1.0;
inactive-opacity-override = false;

# Corners
# If you want rounded corners, uncomment these lines
# corner-radius = 8;
# rounded-corners-exclude = [
#   "window_type = 'dock'",
#   "class_g = 'Polybar'",
#   "class_g = 'Rofi'",
#   "class_g = 'Dunst'"
# ];

# Blur (optional)
blur:
{
  method = "dual_kawase";
  strength = 3;
  background = false;
  background-frame = false;
  background-fixed = false;
};
blur-background-exclude = [
  "window_type = 'dock'",
  "class_g = 'Polybar'",
  "class_g = 'Rofi'",
  "class_g = 'Dunst'"
];
